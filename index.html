<style data-purpose="animations">
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-wave {
      animation: wave 4s ease-in-out infinite;
    }
    
    .tile-hover:hover {
      transform: scale(1.05) translateY(-2px);
      filter: brightness(1.1);
    }
    
    @keyframes flipY {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }
    
    .tile-flipped {
      animation: flipY 0.6s ease-in-out;
      transform: rotateY(180deg);
    }
    
    .tile-flipped img {
      transform: rotateY(180deg);
    }
    
    .bg-tet-image {
      background-image: url('./images/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    
    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .modal-overlay.show {
      display: flex;
      opacity: 1;
    }
    
    .modal-content {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border: 6px solid #ea580c;
      border-radius: 2rem;
      padding: 2rem;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transform: scale(0.7);
      transition: transform 0.3s ease;
    }
    
    .modal-overlay.show .modal-content {
      transform: scale(1);
    }
    
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 2rem;
      height: 2rem;
      background: rgba(255, 255, 255, 0.3);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #7c2d12;
      transition: all 0.2s;
      padding-bottom: 6px;
    }

      background: rgba(255, 255, 255, 0.5);

            document.addEventListener('DOMContentLoaded', () => {
              const grid = document.getElementById('game-grid');
              for (let i = 0; i < 20; i++) {
                const tileIndex = i + 1; // 1-based index
                const tile = document.createElement('button');
                tile.className = 'tile-hover group relative w-20 h-20 md:w-32 md:h-32 bg-red-900/60 rounded-3xl flex items-center justify-center transition-all duration-200 cursor-pointer p-4 md:p-5';
                tile.setAttribute('data-purpose', 'lucky-envelope-tile');
                tile.setAttribute('data-flipped', 'false');
                tile.setAttribute('data-index', tileIndex);
                tile.innerHTML = `
                  <!-- Envelope Icon -->
                  <img src="./images/luckymoney.png" alt="Lì xì" class="w-full h-full object-contain transform transition-transform group-hover:scale-110 drop-shadow-lg" style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));" />
                `;
                
                // Add click event for flip animation
                tile.addEventListener('click', function() {
                  const isFlipped = this.getAttribute('data-flipped') === 'true';
                  
                  if (!isFlipped) {
                    // Add flip animation
                    this.classList.add('tile-flipped');
                    
                    // After half the animation, change image and background
                    setTimeout(() => {
                      const img = this.querySelector('img');
                      // Check if this tile has a question
                      if (questionData[tileIndex]) {
                        // If question has feature, show clover, else show question icon
                        if (questionData[tileIndex].feature) {
                          img.src = './images/clover.png';
                          img.alt = 'Clover';
                        } else {
                          img.src = './images/questionV2.png';
                          img.alt = 'Question';
                        }
                      } else {
                        img.src = './images/clover.png';
                        img.alt = 'Clover';
                      }
                      this.style.backgroundColor = 'rgb(234, 179, 8)';
                      this.style.transition = 'background-color 0.3s ease';
                      this.setAttribute('data-flipped', 'true');
                      
                      // Show modal after flip completes
                      setTimeout(() => {
                        showModal(tileIndex);
                      }, 300);
                    }, 300);
                  }
                });
                
                grid.appendChild(tile);
              }
            });
            
            // Modal functions
            window.showModal = function(index) {
              const modal = document.getElementById('result-modal');
              const modalContent = modal.querySelector('.modal-content > div');
              
              if (questionData[index]) {
                const data = questionData[index];
                
                // Check if this is a feature-only (no question)
                if (!data.question) {
                  // Feature-only display
                  const pointsHtml = data.hidePoints ? '' : `
                    <div class="bg-orange-800/30 rounded-lg p-4">
                      <span class="text-xl font-bold text-orange-900">Giá trị: ${data.points} điểm</span>
                    </div>
                  `;
                  
                  modalContent.innerHTML = `
                    <div class="text-center">
                      <img src="./images/clover.png" alt="Clover" class="h-32 mx-auto mb-6" />
                      <div class="bg-gradient-to-r from-red-600 to-orange-600 rounded-xl p-6 mb-4 shadow-lg border-2 border-yellow-300">
                        <div class="flex items-center justify-center gap-3 mb-3">
                          <span class="text-4xl">${data.featureIcon}</span>
                          <span class="text-2xl font-black text-white uppercase tracking-wide">TÍNH NĂNG ĐẶC BIỆT</span>
                        </div>
                        <p class="text-xl font-bold text-yellow-100">${data.feature}</p>
                      </div>
                      ${pointsHtml}
                    </div>
                  `;
                } else {
                  // Normal question with or without feature
                  const imgSrc = data.feature ? './images/clover.png' : './images/questionV2.png';
                  const imgAlt = data.feature ? 'Clover' : 'Question';
                  
                  // Build feature display if exists
                  const featureHtml = data.feature ? `
                    <div class="bg-gradient-to-r from-red-600 to-orange-600 rounded-xl p-4 mb-4 shadow-lg border-2 border-yellow-300">
                      <div class="flex items-center justify-center gap-2">
                        <span class="text-3xl">${data.featureIcon}</span>
                        <span class="text-xl font-black text-white uppercase tracking-wide">TÍNH NĂNG ĐẶC BIỆT</span>
                      </div>
                      <p class="text-lg font-bold text-yellow-100 mt-2">${data.feature}</p>
                    </div>
                  ` : '';
                  
                  const pointsHtml = data.hidePoints ? '' : `
                    <div class="bg-orange-800/30 rounded-lg p-3 mb-4">
                      <span class="text-lg font-bold text-orange-900">Câu hỏi có giá trị ${data.points} điểm</span>
                    </div>
                  `;
                  
                  modalContent.innerHTML = `
                    <div class="text-center">
                      <img src="${imgSrc}" alt="${imgAlt}" class="h-24 mx-auto mb-4" />
                      ${featureHtml}
                      ${pointsHtml}
                      <p class="text-left text-2xl font-bold text-orange-900 mb-4">${data.question}</p>
                      <div class="text-left space-y-2">
                        ${data.options.map(option => {
                          return `<p class="text-xl text-orange-800">${option}</p>`;
                        }).join('')}
                      </div>
                    </div>
                  `;
                }
              } else {
                modalContent.innerHTML = `
                  <div class="text-center">
                    <img src="./images/clover.png" alt="Clover" class="w-32 h-32 mx-auto mb-4" />
                    <p class="text-2xl font-bold text-orange-800">Chúc bạn may mắn<br/>lần sau</p>
                  </div>
                `;
              }
              
              modal.classList.add('show');
            };
            
            window.closeModal = function() {
              const modal = document.getElementById('result-modal');
              modal.classList.remove('show');
            };
            
            // Close modal on overlay click
            document.getElementById('result-modal').addEventListener('click', function(e) {
              if (e.target === this) {
                closeModal();
              }
            });
