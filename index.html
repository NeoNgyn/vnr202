<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Giải Mã Lì Xì - Tết Game</title>
<!-- BEGIN: Tailwind CSS & Configuration -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tetRed: {
              light: '#f43f5e',
              DEFAULT: '#dc2626',
              dark: '#991b1b',
            },
            tetGold: {
              light: '#fde047',
              DEFAULT: '#fbbf24',
              dark: '#b45309',
            }
          },
          backgroundImage: {
            'tet-gradient': 'radial-gradient(circle at center, #ef4444 0%, #991b1b 100%)',
          }
        }
      }
    }
  </script>
<!-- END: Tailwind CSS & Configuration -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
    
    .gold-title {
      font-family: 'Montserrat', sans-serif;
      color: #fbbf24;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    
    .glowing-outline {
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.8), 0 0 20px rgba(251, 191, 36, 0.4);
    }
  </style>
<style data-purpose="animations">
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-wave {
      animation: wave 4s ease-in-out infinite;
    }
    
    .tile-hover:hover {
      transform: scale(1.05) translateY(-2px);
      filter: brightness(1.1);
    }
    
    @keyframes flipY {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }
    
    .tile-flipped {
      animation: flipY 0.6s ease-in-out;
      transform: rotateY(180deg);
    }
    
    .tile-flipped img {
      transform: rotateY(180deg);
    }
    
    .bg-tet-image {
      background-image: url('./images/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    
    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .modal-overlay.show {
      display: flex;
      opacity: 1;
    }
    
    .modal-content {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border: 6px solid #ea580c;
      border-radius: 2rem;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transform: scale(0.7);
      transition: transform 0.3s ease;
    }
    
    .modal-overlay.show .modal-content {
      transform: scale(1);
    }
    
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 2rem;
      height: 2rem;
      background: rgba(255, 255, 255, 0.3);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #7c2d12;
      transition: all 0.2s;
    }
    
    .modal-close:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: scale(1.1);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-tet-image min-h-screen flex items-center justify-center font-sans">
<!-- BEGIN: Modal Popup -->
<div id="result-modal" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="text-center">
      <img src="./images/clover.png" alt="Clover" class="w-32 h-32 mx-auto mb-4" />
      <p class="text-2xl font-bold text-orange-800">Chúc bạn may mắn<br/>lần sau</p>
    </div>
  </div>
</div>
<!-- END: Modal Popup -->
<!-- BEGIN: Main Content Wrapper -->
<main class="relative z-10 w-full max-w-6xl px-4 py-8 flex flex-col items-center">
<!-- BEGIN: Header Section -->
<header class="text-center mb-8 mt-12" data-purpose="game-header">
<h1 class="text-6xl md:text-8xl font-black gold-title glowing-outline tracking-tighter uppercase italic">
        GIẢI MÃ LÌ XÌ
      </h1>
<p class="text-yellow-100/80 mt-2 font-medium tracking-widest uppercase">Khai Xuân Như Ý - Nhận Lộc Đầu Năm</p>
</header>
<!-- END: Header Section -->
<div class="flex flex-col lg:flex-row items-center justify-center gap-12 w-full">
<!-- BEGIN: Game Grid Panel -->
<section class="bg-tetRed-dark/40 backdrop-blur-sm p-6 rounded-[2.5rem] shadow-2xl border-4 border-tetRed-light/30" data-purpose="game-grid-container">
<!-- 5x4 Grid Layout -->
<div class="grid grid-cols-5 gap-4 md:gap-5 p-4" id="game-grid">
<!-- JS will populate tiles or we hardcode 20 for static representation -->
<!-- Tile Template -->
<script data-purpose="grid-generator">
            document.addEventListener('DOMContentLoaded', () => {
              const grid = document.getElementById('game-grid');
              for (let i = 0; i < 20; i++) {
                const tile = document.createElement('button');
                tile.className = 'tile-hover group relative w-20 h-20 md:w-32 md:h-32 bg-red-900/60 rounded-3xl flex items-center justify-center transition-all duration-200 cursor-pointer p-4 md:p-5';
                tile.setAttribute('data-purpose', 'lucky-envelope-tile');
                tile.setAttribute('data-flipped', 'false');
                tile.innerHTML = `
                  <!-- Envelope Icon -->
                  <img src="./images/luckymoney.png" alt="Lì xì" class="w-full h-full object-contain transform transition-transform group-hover:scale-110 drop-shadow-lg" style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));" />
                `;
                
                // Add click event for flip animation
                tile.addEventListener('click', function() {
                  const isFlipped = this.getAttribute('data-flipped') === 'true';
                  
                  if (!isFlipped) {
                    // Add flip animation
                    this.classList.add('tile-flipped');
                    
                    // After half the animation, change image and background
                    setTimeout(() => {
                      const img = this.querySelector('img');
                      img.src = './images/clover.png';
                      img.alt = 'Clover';
                      this.style.backgroundColor = 'rgb(234, 179, 8)';
                      this.style.transition = 'background-color 0.3s ease';
                      this.setAttribute('data-flipped', 'true');
                      
                      // Show modal after flip completes
                      setTimeout(() => {
                        showModal();
                      }, 300);
                    }, 300);
                  }
                });
                
                grid.appendChild(tile);
              }
            });
            
            // Modal functions
            window.showModal = function() {
              const modal = document.getElementById('result-modal');
              modal.classList.add('show');
            };
            
            window.closeModal = function() {
              const modal = document.getElementById('result-modal');
              modal.classList.remove('show');
            };
            
            // Close modal on overlay click
            document.getElementById('result-modal').addEventListener('click', function(e) {
              if (e.target === this) {
                closeModal();
              }
            });
          </script>
</div>
</section>
<!-- END: Game Grid Panel -->
</div>
<!-- BEGIN: Footer Branding -->
<footer class="relative z-20 mt-12 mb-4 text-white/80 text-sm flex items-center gap-4 justify-center" data-purpose="footer-info">
<span>CHÚC MỪNG NĂM MỚI 2026</span>
<span class="w-1 h-1 bg-white/40 rounded-full"></span>
<span>XUÂN BÍNH NGỌ</span>
</footer>
<!-- END: Footer Branding -->
</main>
<!-- END: Main Content Wrapper -->
</body></html>
